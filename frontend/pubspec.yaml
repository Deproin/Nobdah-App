name: nobdah
description: A random anonymous voice calling app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_webrtc: ^1.4.1
  web_socket_channel: ^3.0.3
  permission_handler: ^11.3.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  audioplayers: ^6.7.0
  provider: ^6.1.5+1
  wakelock_plus: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#0F0F1E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
